site_name: "Trainpot AI Scraper Detection Honeypot"
site_description: "Documentation for the Trainpot AI Scraper Detection Honeypot"
site_author: "Forewarned, Inc."
site_url: https://honeypot-docs.readthedocs.io/projects/hp-trainpot/en/latest/

docs_dir: docs

copyright: "Copyright &copy; 2026 Forewarned, Inc."

theme:
  name: readthedocs

markdown_extensions:
  - codehilite
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - fenced_code
  - md_in_html

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
  - Configuration:
    - Configuration Guide: configuration.md
  - Usage:
    - Running the Honeypot: running.md
  - Architecture:
    - System Architecture: architecture.md
  - Custom Content:
    - Customizing Pages: custom-content.md
  - Troubleshooting:
    - Common Issues: troubleshooting.md
  - FAQ: faq.md

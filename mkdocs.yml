site_name: "STINGAR Honeypot Documentation"
site_description: "Public documentation for STINGAR honeypot deployments"
site_author: "Forewarned, Inc."
site_url: https://honeypot-docs.readthedocs.io/

docs_dir: docs


copyright: "Copyright &copy; 2026 Forewarned, Inc."

theme:
  name: readthedocs

markdown_extensions:
  - codehilite
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - fenced_code
  - md_in_html

plugins:
  - search

nav:
  - Home: index.md
